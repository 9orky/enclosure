name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Clean packaging artifacts
        run: |
          rm -rf .dev build dist src/*.egg-info

      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv

      - name: Run unit tests
        run: make test

      - name: Bootstrap enclosure contract
        run: uv run --group dev enclosure workspace sync init

      - name: Run architecture self-checks
        run: |
          uv run --group dev enclosure architecture boundaries
          uv run --group dev enclosure architecture shape

      - name: Build distributions
        run: uv run --group dev python -m build --outdir dist

      - name: Check distribution metadata
        run: uv run --group dev python -m twine check dist/*

      - name: Smoke test installed wheel
        run: |
          python -m venv .dev/pkg-smoke
          .dev/pkg-smoke/bin/pip install dist/enclosure-*.whl
          .dev/pkg-smoke/bin/enclosure --help
