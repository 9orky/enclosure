name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build and verify release artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check out release tag
        if: github.event_name == 'release'
        run: |
          git fetch --force --tags origin "refs/tags/${{ github.event.release.tag_name }}:refs/tags/${{ github.event.release.tag_name }}"
          git -c advice.detachedHead=false checkout --force "refs/tags/${{ github.event.release.tag_name }}"
          git clean -ffdx

      - name: Verify release checkout
        if: github.event_name == 'release'
        run: |
          tag_name="${{ github.event.release.tag_name }}"
          tag_sha="$(git rev-list -n 1 "$tag_name")"
          head_sha="$(git rev-parse HEAD)"

          echo "Release tag: $tag_name"
          echo "Tag commit: $tag_sha"
          echo "HEAD commit: $head_sha"
          git describe --tags --dirty --always

          if [ "$head_sha" != "$tag_sha" ]; then
            echo "Release checkout mismatch: HEAD is not the release tag commit." >&2
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Clean packaging artifacts
        run: |
          rm -rf .dev build dist src/*.egg-info src/enclosure/_version.py

      - name: Export package version from GitHub release
        if: github.event_name == 'release'
        run: |
          release_version="${{ github.event.release.tag_name }}"
          release_version="${release_version#v}"
          echo "SETUPTOOLS_SCM_PRETEND_VERSION_FOR_ENCLOSURE=$release_version" >> "$GITHUB_ENV"

      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv

      - name: Verify release tag matches derived package version
        if: github.event_name == 'release'
        run: |
          uv run --group dev python - <<'PY'
          import sys
          from importlib.metadata import version

          enclosure_version = version("enclosure")
          tag_name = "${{ github.event.release.tag_name }}"
          expected_tag = f"v{enclosure_version}"

          if tag_name != expected_tag:
              print(
                  f"Release tag/version mismatch: tag is '{tag_name}' but derived package version is '{enclosure_version}'. Expected tag '{expected_tag}'.",
                  file=sys.stderr,
              )
              raise SystemExit(1)

          print(f"Verified release tag {tag_name} matches package version {enclosure_version}.")
          PY

      - name: Run tests
        run: make test

      - name: Bootstrap enclosure contract
        run: uv run --group dev enclosure workspace sync init

      - name: Run architecture self-checks
        run: |
          uv run --group dev enclosure architecture boundaries
          uv run --group dev enclosure architecture shape

      - name: Build distributions
        run: uv run --group dev python -m build --outdir dist

      - name: Verify built artifact versions
        if: github.event_name == 'release'
        run: |
          uv run --group dev python - <<'PY'
          import sys
          import zipfile
          from email.parser import Parser
          from pathlib import Path

          expected_version = "${{ github.event.release.tag_name }}".removeprefix("v")
          wheels = sorted(Path("dist").glob("*.whl"))
          versions: dict[str, str] = {}

          for wheel in wheels:
              with zipfile.ZipFile(wheel) as archive:
                  metadata_name = next(
                      name for name in archive.namelist()
                      if name.endswith(".dist-info/METADATA")
                  )
                  metadata = Parser().parsestr(
                      archive.read(metadata_name).decode("utf-8")
                  )
              versions[metadata["Name"]] = metadata["Version"]

          for package_name in ("enclosure",):
              package_version = versions.get(package_name)
              if package_version != expected_version:
                  print(
                      f"Built artifact version mismatch: {package_name} is "
                      f"'{package_version}' but release tag expects "
                      f"'{expected_version}'.",
                      file=sys.stderr,
                  )
                  raise SystemExit(1)

          print(f"Verified built artifacts match {expected_version}.")
          PY

      - name: Check distribution metadata
        run: uv run --group dev python -m twine check dist/*

      - name: Smoke test wheel install
        run: |
          python -m venv .dev/pkg-smoke
          .dev/pkg-smoke/bin/pip install dist/enclosure-*.whl
          .dev/pkg-smoke/bin/enclosure --help

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error

  github-release-assets:
    name: Attach artifacts to GitHub release
    if: github.event_name == 'release'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*

  publish-testpypi:
    name: Publish to TestPyPI
    if: github.event_name == 'release' && github.event.release.prerelease
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/enclosure/
    permissions:
      id-token: write

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to TestPyPI with Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    if: github.event_name == 'release' && !github.event.release.prerelease
    needs:
      - build
      - github-release-assets
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/enclosure/
    permissions:
      id-token: write

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI with Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
